services:
  - type: web
    name: skillcanvas-api
    runtime: node
    rootDir: apps/api
    plan: free
    buildCommand: rm -rf node_modules ../../node_modules && npm install --include=dev --workspace=skillcanvas-api && npm rebuild better-sqlite3 --workspace=skillcanvas-api && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEB_ORIGIN
        value: https://TEMP.vercel.app
      - key: NODE_VERSION
        value: 20.18.0